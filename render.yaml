# render.yaml — deployment config for Render.com (alternative to Railway)

services:
  - type: web
    name: foresight-due-date-ml
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"